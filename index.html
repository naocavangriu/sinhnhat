
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc mừng sinh nhật!</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #fff9c4; font-family: 'Quicksand', sans-serif; overflow: hidden; color: #5d4037; cursor: pointer; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; text-align: center; }
        .icon { font-size: 80px; margin-bottom: 10px; animation: shake 0.5s infinite; }
        @keyframes shake { 0% { transform: rotate(0); } 25% { transform: rotate(5deg); } 75% { transform: rotate(-5deg); } 100% { transform: rotate(0); } }
        h1 { font-family: 'Pacifico', cursive; font-size: 28px; color: #f57c00; margin: 10px 0; }
        .message-box { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 85%; min-height: 120px; font-size: 18px; line-height: 1.6; border: 3px dashed #ffb74d; }
        .hint { margin-top: 25px; font-size: 14px; color: #f57c00; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
<audio id="birthday-audio" loop preload="auto">
    <source src="https://www.mboxdrive.com/khuc-hat-mung-sinh-nhat-uia.mp3" type="audio/mpeg">
</audio>

    <div class="container">
        <div class="icon">🤡</div>
        <h1 id="name-display">Happy Birthday!</h1>
        <div class="message-box" id="typewriter"></div>
        <p class="hint">CHẠM VÀO MÀN HÌNH ĐỂ NGHE NHẠC "UIA UIA" ✨</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name') || "bạn hiền";
        document.getElementById('name-display').innerText = "Chúc mừng sinh nhật, " + name + "!";

        const text = "Chúc mừng sinh nhật thanh niên 13 tuổi! Tuổi mới bớt báo anh em, ăn nhiều cho mau cao chứ đừng cao mỗi cái sừng nhé. Bớt ảo tưởng mình là siêu nhân đi, về làm bạn tốt của 4 đứa mình là được rồi. Sinh nhật vui vẻ, bớt nghiệp lại nha!";
        
        let i = 0;
        function type() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++; setTimeout(type, 70);
            }
        }
        
        // Nhạc CHẮC CHẮN sẽ phát khi chạm vào màn hình
        document.body.addEventListener('click', function() {
            const audio = document.getElementById('birthday-audio');
            audio.play().then(() => {
                console.log("Nhạc đang phát!");
            }).catch(e => console.log("Lỗi nhạc: ", e));
        }, { once: true });

        window.onload = type;
    </script>
</body>
</html>
